services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: aimops-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./models/hf_cache:/app/models/hf_cache

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: aimops-frontend
    environment:
      - VITE_API_BASE=http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
